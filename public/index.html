<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Løftebukk-booking</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Page-specific tweaks */
    .book-btn-wrap { text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <header>
    <h1>🔧 Løftebukk-booking</h1>
    <p class="subtitle">Mekkeklubben — frivilligtilgang</p>
  </header>

  <main>
    <!-- Calendar card -->
    <div class="card">
      <div class="calendar-header">
        <button class="nav-btn" id="prev-month">&#8249;</button>
        <h2 id="month-title">–</h2>
        <button class="nav-btn" id="next-month">&#8250;</button>
      </div>
      <div class="calendar-weekdays">
        <span>Man</span><span>Tir</span><span>Ons</span>
        <span>Tor</span><span>Fre</span><span>Lør</span><span>Søn</span>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <div class="legend">
        <span class="legend-item"><span class="legend-swatch sw-available"></span> Ledig</span>
        <span class="legend-item"><span class="legend-swatch sw-partial"></span> Delvis opptatt</span>
        <span class="legend-item"><span class="legend-swatch sw-full"></span> Opptatt</span>
        <span class="legend-item"><span class="legend-swatch sw-thursday"></span> Ungdomsklubb</span>
      </div>
    </div>

    <!-- Day detail card (hidden until day selected) -->
    <div class="card" id="day-detail" style="display:none">
      <div class="day-detail-header">
        <h3 id="detail-date-title">–</h3>
        <button class="btn btn-ghost btn-sm" id="close-detail">✕ Lukk</button>
      </div>
      <div id="detail-bookings"></div>
      <div class="book-btn-wrap" id="book-btn-wrap"></div>
    </div>
  </main>

  <!-- Booking modal -->
  <div class="modal-overlay" id="booking-modal" style="display:none" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal-close" id="close-modal" aria-label="Lukk">✕</button>

      <div id="form-view">
        <h2>Book løftebukken</h2>
        <p class="booking-date-info" id="booking-date-info">–</p>

        <div class="time-bar-wrap" id="time-bar-wrap" style="display:none">
          <p class="time-bar-label">Allerede booket denne dagen:</p>
          <div class="time-bar" id="time-bar"></div>
          <div class="time-bar-ticks" id="time-bar-ticks"></div>
        </div>

        <div class="alert alert-error" id="form-error"></div>

        <form id="booking-form" novalidate>
          <div class="form-group">
            <label for="f-name">Fullt navn *</label>
            <input type="text" id="f-name" autocomplete="name" placeholder="Ola Nordmann" inputmode="text">
          </div>
          <div class="form-group">
            <label for="f-phone">Telefonnummer *</label>
            <input type="tel" id="f-phone" autocomplete="tel" placeholder="900 12 345" inputmode="tel">
          </div>
          <div class="form-group">
            <label for="f-plate">Skiltnummer *</label>
            <input type="text" id="f-plate" placeholder="AB 12345" autocomplete="off" inputmode="text" style="text-transform:uppercase">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="f-start">Fra *</label>
              <select id="f-start"></select>
            </div>
            <div class="form-group">
              <label for="f-end">Til *</label>
              <select id="f-end"></select>
            </div>
          </div>
          <div class="form-group">
            <label for="f-notes">Hva skal gjøres? (valgfritt)</label>
            <textarea id="f-notes" placeholder="Oljeskift, bremseskift, …"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="submit-btn">
            Send booking-forespørsel
          </button>
        </form>
      </div>

      <div id="success-view" style="display:none" class="success-box">
        <div class="success-icon">✓</div>
        <h3>Booking sendt!</h3>
        <p>Forespørselen din er til behandling.<br>En admin godkjenner den snart.</p>
        <button class="btn btn-primary" id="close-success">Tilbake til kalenderen</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
