<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Admin – Løftebukk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen font-sans antialiased">

  <!-- Login page -->
  <div id="login-page" class="hidden min-h-screen flex items-center justify-center p-5 bg-gradient-to-br from-slate-900 to-slate-800">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center">
      <div class="text-5xl mb-3">🔐</div>
      <h1 class="text-xl font-extrabold text-slate-900 mb-1">Admin-innlogging</h1>
      <p class="text-slate-500 text-sm mb-6">Løftebukk-booking — mekkeklubben</p>
      <div id="login-error" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl text-left"></div>
      <form id="login-form" novalidate class="space-y-4 text-left">
        <div>
          <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5">Brukernavn</label>
          <input type="text" id="username" autocomplete="username" placeholder="Ditt navn"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition text-base">
        </div>
        <div>
          <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Passord</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition text-base">
        </div>
        <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors">
          Logg inn
        </button>
      </form>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="admin-page" class="hidden">

    <header class="bg-gradient-to-r from-slate-900 to-slate-800 text-white px-4 py-4 shadow-lg">
      <div class="max-w-2xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <span class="text-xl">🔧</span>
          <div>
            <h1 class="font-extrabold text-base tracking-tight leading-tight">Admin-panel</h1>
            <p class="text-slate-400 text-xs" id="admin-name-label"></p>
          </div>
        </div>
        <button id="logout-btn" class="text-sm text-slate-300 hover:text-white font-medium transition-colors px-3 py-1.5 rounded-lg hover:bg-white/10">
          Logg ut →
        </button>
      </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-5">

      <div id="admin-error" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-xl"></div>

      <!-- Tabs -->
      <div class="flex gap-1.5 bg-white rounded-2xl p-1.5 mb-5 shadow-sm border border-slate-100 overflow-x-auto">
        <button class="tab-btn flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-sm font-semibold transition-all bg-blue-600 text-white whitespace-nowrap" data-tab="pending">
          Til behandling <span id="badge-pending" class="bg-white/25 text-white text-xs font-bold px-2 py-0.5 rounded-full">0</span>
        </button>
        <button class="tab-btn flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-500 hover:bg-slate-50 whitespace-nowrap" data-tab="approved">
          Godkjent <span id="badge-approved" class="bg-slate-100 text-slate-500 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
        </button>
        <button class="tab-btn flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-500 hover:bg-slate-50 whitespace-nowrap" data-tab="rejected">
          Avvist <span id="badge-rejected" class="bg-slate-100 text-slate-500 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
        </button>
        <button class="tab-btn flex-1 flex items-center justify-center gap-1.5 py-2.5 rounded-xl text-sm font-semibold transition-all text-slate-500 hover:bg-slate-50 whitespace-nowrap" data-tab="stats">
          📊 Statistikk
        </button>
      </div>

      <div id="bookings-list"></div>
      <div id="stats-panel" class="hidden"></div>

    </main>
  </div>

  <!-- Reject reason modal -->
  <div id="reject-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-5" style="background:rgba(0,0,0,.5);backdrop-filter:blur(4px)">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
      <h3 class="font-extrabold text-slate-900 mb-1">Avvis booking</h3>
      <p class="text-slate-500 text-sm mb-4">Oppgi en kort begrunnelse — den sendes til den frivillige på e-post.</p>
      <textarea id="reject-reason" rows="3" placeholder="F.eks. overlapper med annet arrangement, stedet er ikke tilgjengelig…"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-red-500 focus:ring-2 focus:ring-red-500/20 outline-none transition text-sm resize-none mb-4"></textarea>
      <div class="flex gap-3">
        <button id="reject-confirm" class="flex-1 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl transition-colors text-sm">Avvis booking</button>
        <button id="reject-cancel" class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors text-sm">Avbryt</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
